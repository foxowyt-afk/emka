<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="js/theme-init.js"></script>
    <title>Start</title>
    <!-- TEN STYL BEZ ZMIAN -->
    <style>
      /* ... cały styl bez zmian ... */
    </style>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/guard.css" />
    <script src="js/guard.js" defer></script>
    <script src="js/theme.js" defer></script>
  </head>
  <body>
    <!-- TEN HTML BEZ ZMIAN -->
    <div id="desktopView"></div>
    <div id="mobileView" style="display: contents;">
        <!-- ... reszta bez zmian ... -->
    </div>

    <script>
      const isDesktopDevice = window.innerWidth > 1024 || (!('ontouchstart' in window) && navigator.maxTouchPoints === 0) || screen.width > 1200;

      if (isDesktopDevice) {
          document.getElementById('mobileView').style.display = 'none';
          document.getElementById('desktopView').style.display = 'block';
          window.location.replace("https://www.jw.org/pl/");
      }

      // 🔥 ZMIENIONE: redirect na LOGIN.html zamiast index.html
      window.addEventListener('load', () => {
        setTimeout(() => {
          window.location.replace("login.html");  // ← ZMIENIONE!
        }, 1000);
      });

      // Reszta theme toggle bez zmian...
      const themeToggle = document.getElementById("themeToggle");
      // ... reszta kodu bez zmian
    </script>
  </body>
</html>
